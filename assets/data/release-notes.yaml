# コピー用改行

- date: TBD
  funcVersion: 4.0.0-alpha12
  dataVersion: 3.2.3
  contents: |
    - __アプリの安定化とデザイン変更__
    - 各ページの検索欄を削除し、右上の検索アイコンからすべてまとめて検索できるように。
    - 素材テーブル表示のデザインを大幅変更。
    - [漢字の読み一覧](https://www.chikach.net/does-not-matter/genshin-yomi/)を本アプリに統合 (予定)
    - 素材名のルビを表示するように。(元々検索用の読みデータなので、漢字以外も含めてカタカナで表示されます。また、読みがはっきりしない単語については、パイプ(|)区切りで複数表示されます。)
    - 調度品セットの素材を収集中マークできるように
    - 調度品カテゴリー(製作時)の表示を追加

- date: 2022/11/11
  funcVersion: 3.10.0
  dataVersion: 3.2.3
  contents: |
    - __武器を装備させるキャラを登録できるように__
    - 「ゲームデータと同期」で武器の育成状況の同期ができるように
    - 「収集中の素材」の素材ごとの合計数表示において、以前より明確に使用先が表示されるように。また、一括で収集中マークの付け外しができるように。
    - キャラを武器種で絞り込むことが可能に

- date: 2022/11/11
  funcVersion: 3.9.0
  dataVersion: 3.2.3
  contents: |
    - キャラクター「レイラ」追加

- date: 2022/11/9
  funcVersion: 3.9.0
  dataVersion: 3.2.2
  contents: |
    - 素材のテイワットマップをフレームで表示する機能追加。(テイワットマップ側の実装が原因で、読み込み後しばらく勝手にスクロールします。ご了承ください。)

- date: 2022/10/3
  funcVersion: 3.8.0
  dataVersion: 3.1.1
  contents: |
    - 以前より高速にページが表示されるように
    - 自動インポート機能の追加。「データを取得」などの操作が不要になります。
    - 聖遺物を装備するキャラ選択画面のレイアウトが崩れていた問題の修正
