# コピー用改行

- date: TBD
  funcVersion: 4.0.0-dev
  dataVersion: 3.2.3
  contents: |
    - __アプリの安定化とデザイン変更__
    - 各ページの検索欄を削除し、右上の検索アイコンからすべてまとめて検索できるように。
    - 素材テーブル表示のデザインを大幅変更。
    - [漢字の読み一覧](https://www.chikach.net/does-not-matter/genshin-yomi/)を本アプリに統合 (予定)
    - 素材名のルビを表示するように。(元々検索用の読みデータなので、漢字以外も含めてカタカナで表示されます。また、読みがはっきりしない単語については、パイプ(|)区切りで複数表示されます。)
    - 調度品セットの素材を収集中マークできるように
    - 調度品カテゴリー(製作時)の表示を追加
