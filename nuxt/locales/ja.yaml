about:
  settings:
    h: 設定
    auto_import: 自動インポート
    auto_import_desc: ゲームデータと同期する際、「データを取得」などの操作が不要になります。
    clear_imported: インポートしたデータをクリア
    clear_imported_confirm: インポートしたキャラクター育成状況をクリアしますか？すべてのスライダーのデフォルト位置が「Lv. 1」にリセットされます。

  supported_browser: |
    
    ## 基本機能の対応ブラウザー / OS
    
    ### PC
    - Firefox(推奨): 最新版
    - Google Chrome / Microsoft Edge: 最新版
    - Safari(macOS): v14.0以降
    
    ### スマートフォン
    - Android 4.3 以降
    - iOS/iPadOS 14.0 以降
    
    ## 通知の対応ブラウザー / OS
    __iOS/iPadOSはブラウザーの種類に関わらずサポートされていません。__
    - Firefox: 最新版
    - Google Chrome / Microsoft Edge: 最新版

  farming_count: |
    
    ## 周回回数計算の条件など
    
    - 有志の方が統計処理した平均獲得数を用いて算出しています。
    - 秘境は最高ランクのものを、(使用可能なものは)濃縮樹脂を使用して周回した際の数値です。また、フィールドボスや地脈は世界ランク7以上です。
    - 合成できる素材はすべて換算しています。
    - 小数点以下は切り上げています。

  buy_me_coffee: |
    
    ## 支援について
    
    本アプリを気に入っていただけましたら、こちらからコーヒーをおごっていただけると喜びます。

  feedback: |
    
    ## ご意見・ご要望・不具合や誤植の報告について
    
    1人で開発しているため、皆様のフィードバックは非常に励みになります。
    [HoYoLAB記事](https://hoyolab.com/article/5147725)へのコメントや[開発者Twitter](https://twitter.com/messages/compose?recipient_id=973732394288033793)のDMで受け付けていますので、どしどしお寄せください。

  trademarks:
    h: 商標などについて
    lines: |
      「原神」は、miHoYo Limited の商標です。「HoYoverse」は、COGNOSPHERE PTE. LTD.の商標です。
      miHoYo 及び COGNOSPHERE は本ソフトウェアの開発に一切関与しておりません。
      画像・データ：©miHoYo/COGNOSPHERE

