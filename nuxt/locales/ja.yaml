weapon_description:
  u4-04: |
    炎・雷元素付着中の敵に対するダメージ<+20%>
  u4-15: |
    ・通常攻撃 / 重撃 / 落下攻撃が的に命中すると、<180%>の範囲ダメージを与える。
    ・上記の効果が発動後<8秒間>、攻撃力<+15%>。(クールタイム8秒)
  u4-16: |
    ・燃焼、原激化、超激化、草激化、開花、超開花、列開花 反応を起こすと、キャラクターの周囲に<10秒>だけ残る「唯識の葉」が生成される。これを拾ったキャラは<12秒間>、元素熟知<+60>。この効果は重ねがけ出来ない。(待機中発動可、生成クールタイム20秒)
  u4-17: |
    ・登場後<10秒>ごとに、元素チャージ効率<+((元素熟知)×0.036)%>
    ・チーム内の他キャラの元素チャージ効率<+上記効果の30%>
    (継続時間<12秒>、同武器による重ねがけ可、待機中発動可)
  u5-01: |
    ・攻撃力<+20%>
    ・被弾時、<攻撃力×100%>のHPを回復し、周囲の敵に<攻撃力×200%>のダメージを与える。(クールタイム15秒)
  u5-02: |
    ・会心率<+4%>
    ・元素爆発使用後<12秒間>、移動速度<+10%>、攻撃速度<+10%>、通常攻撃/重撃命中時、<攻撃力×20%>の追加ダメージ
  u5-03: |
    ・シールド強化<+20%>
    ・攻撃命中後<8秒間>、攻撃力<+4%> (シールド状態中は効果2倍、最大<5>スタック、発動クールタイム0.3秒)
  u5-04: |
    ・HP上限<+20%>
    ・攻撃力<+HP×1.2%>
  u5-05: |
    ・与ダメージ<+10%>
    ・元素反応時に蓄積するスタック2個で<12秒間>、チーム全員 通常/重撃/落下ダメージ<+12%>、攻撃力<+20%>。(待機キャラスタック可、スタッククールタイム0.5秒、発動後スタッククールタイム20秒、重ね掛け不可)
  u5-06: |
    ・全元素ダメージ<+12%>
    ・通常攻撃で元素ダメージを与えてから<5秒>以内、元素爆発を発動してから<10秒>以内、元素エネルギーが100%に満たない、これらの条件が1/2/3個満たしている時、自身元素タイプの元素ダメージ<+8/16/28%>。
  u5-07: |
    ・全元素ダメージ<+12%>
    ・周囲のチームメンバーのいずれかが元素スキルを発動すると、スタックを1つ獲得(最大2個)。装備キャラが元素スキル発動時、このスタック1つにつき通常攻撃ダメージ<+20%> (<8秒>継続)。
  u5-08: |
    ・HP上限<+20%>
    ・元素スキルが敵に命中後<20秒間>、元素熟知<+HP上限×0.12%> (発動クールタイム0.3秒、最大<3>スタック)
    ・上記効果が3スタックに達する、または3スタック目の継続時間が更新されてから<20秒間>、周囲のチーム全員の元素熟知<+装備キャラのHP上限×0.2%>。
  v4-15: |
    ・キャラ出場後10秒経過ごとに<12秒間>、装備キャラの攻撃力<+元素熟知×24%>、周囲のチーム内キャラの攻撃力<+前記の効果の30%>。(複数の同武器による重ねがけ可、待機中発動可)
  v4-16: |
    ・燃焼、原激化、超激化、草激化、開花、超開花、列開花 反応を起こすと、キャラクターの周囲に「唯識の葉」が生成される(10秒で消滅)。これを拾ったキャラは<12秒間>、元素熟知<+60>。この効果は重ねがけ出来ない。(待機中発動可、生成クールタイム20秒)
  v5-04: |
    ・攻撃力<+16%>
    ・通常/重撃 命中時に蓄積するスタック4個で<12秒間>、通常攻撃速度<+12%>、攻撃力<+20%> (スタッククールタイム 0.3秒、発動後スタッククールタイム20秒、重ね掛け不可)
  v5-05: |
    ・防御力<+28%>
    ・通常/重撃ダメージ<+防御力×40%>
  w4-13: |
    ・燃焼、原激化、超激化、草激化、開花、超開花、列開花 反応を起こすと、キャラクターの周囲に「蘇生の葉」が生成される(10秒で消滅)。これを拾ったキャラは<12秒間>、攻撃力<+16%>。この効果は重ねがけ出来ない。(待機中発動可、生成クールタイム20秒)
  w4-14: |
    ・元素反応を起こしてから<10秒間>、攻撃力<+12%>、元素熟知<+48>。
  w5-06: |
    ・全元素ダメージ<+12%>
    ・元素スキル使用後<20秒間>、1秒毎に攻撃力<+3.2%> (6回まで重ね掛け可、装備キャラ待機中の場合、攻撃力上昇効果2倍)
  w5-07: |
    ・攻撃力<+元素熟知×52%>
    ・元素スキルが敵に命中後<10秒間>、攻撃力<+元素熟知×28%>。(3回まで重複可能)
  x4-16: |
    ・攻撃が敵に命中するたび、与えるダメージが<+6%/+10%/+14%>の中で順番に切り替わる (切り替わりはクールタイム7秒、待機時も発動)。
  x4-17: |
    ・元素スキルまたは元素爆発を発動後<12秒間>、元素熟知<+60>。キャラクターを切り替えると即座に解除される。この効果が解除された時、近くの敵1体に<攻撃力×100%>のダメージを与える。(効果獲得クールタイム20秒)
  x4-18: |
    ・元素スキル発動後<15秒間>、攻撃が敵に命中すると、<攻撃力×80%>の範囲ダメージを与える。3回範囲ダメージが発動すると、15秒経過せずとも解除される。(範囲ダメージクールタイム2秒、効果クールタイム 12秒)
  x5-01: |
    ・会心ダメージ<+20%>
    ・攻撃命中時、<60%>の確率で挟い範囲内の敵に<攻撃力×125%>の物理ダメージを与える (クールタイム4秒)
  x5-06: |
    ・HP<+16%>
    ・周囲に敵がいる時、与えるダメージ<+20%>(待機時も発動)。
  x5-07: |
    ・全元素ダメージ<+12%>。
    ・重撃が敵に命中後<10秒間>、重撃ダメージ+<元素熟知×1.6>。この効果は重撃を12回発動すると、10秒経過せずとも解除される。(発動クールタイム12秒)
  y4-14: |
    ・元素スキル使用後<10秒間>、元素チャージ効率<+24%>
  y4-15: |
    ・元素反応を起こすと、元素熟知<+24>、攻撃力<-5%>。最大<5>スタック獲得可能で、最後に元素反応を起こしてから6秒ごとに1スタックずつ減少する。(待機中発動可、獲得クールタイム0.3秒)
  y4-16: |
    ・登場後10秒ごとに<12秒間>、攻撃力<+元素熟知×24%>、周囲のキャラクターの攻撃力<+(前記の効果で上昇する攻撃力)×30%> (待機中発動可、同武器による重ねがけ可)
  y5-01: |
    ・移動速度<+10%>
    ・キャラをフィールドに出してから4秒ごとに全元素ダメージ<+8%>。最大32%まで。(キャラ退場時まで有効)
  y5-05: |
    ・元素スキル使用後<16秒間>、元素スキルダメージ<+12%> (最大<3>スタック)
    ・上記最大スタックで全元素ダメージ<+12%>
  y5-06: |
    ・チーム内にいる、自身と同じ元素タイプのキャラ1人につき元素熟知<+32>、異なる元素タイプのキャラ1人につき自身の元素タイプの元素ダメージ<+10%>。それぞれ最大3回まで重ねがけ可。
    ・自身を除くチーム全員の元素熟知<+40> (同武器によるこの効果は重ねがけ可)

