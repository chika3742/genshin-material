about:
  settings:
    h: Settings
    auto_import: Auto Import
    auto_import_desc: When synchronizing with game data, operations such as "Get Data" are no longer necessary.
    clear_imported: Clear Imported Data
    clear_imported_confirm: Clear imported character training status? The default position of all sliders will be reset to "Lv. 1".

  supported_browser: |
    
    ## Supported Browser of Basic Functions
    
    ### PC
    - Firefox(recommended): Latest
    - Google Chrome / Microsoft Edge: Latest
    - Safari(macOS): v14.0 or above
    
    ### Smartphone
    - Android 4.3 or above
    - iOS/iPadOS 14.0 or above
    
    ## Supported Browser of Notifications
    __Both iOS and iPadOS are not supported, regardless of browser.__
    - Firefox: Latest
    - Google Chrome / Microsoft Edge: Latest

  farming_count: |
    
    ## Conditions for Calculating the Number of Faming, etc.
    
    - Calculated using the average number of acquisitions statistically processed by volunteers.
    - These numbers are when farmed highest-ranked domains (with condensed resins). Also, field bosses and Lay Lines are when world rank is 7 or higher.
    - All materials that can be crafted are converted.
    - Decimal places are rounded up.

  buy_me_coffee: |
    
    ## About Supporting Me
    
    If you like this application, we would be glad to buy you a cup of coffee from below.

  feedback: |
    
    ## About Feedback
    
    If you have any of the following, please comment in [the HoYoLAB article](https://hoyolab.com/article/5147725) or [DM me on Twitter](https://twitter.com/messages/compose?recipient_id=973732394288033793).
    
    - Comments
    - Requests
    - Reports of problems, typographical errors, or mistranslations

  trademarks:
    h: About Trademarks, etc.
    lines: |
      "Genshin Impact", "miHoYo" is a registered trademark of miHoYo Limited. "COGNOSPHERE", "HoYoverse" is a registered trademark of COGNOSPHERE PTE. LTD.
      miHoYo and COGNOSPHERE are not involved in developing this application.
